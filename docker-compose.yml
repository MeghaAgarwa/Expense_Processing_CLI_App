version: "3.9"

services:
  db:
    image: postgres:16
    container_name: expense_db #host name
    restart: always
    environment: # to initialize the database
      POSTGRES_DB: expenses
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: expense_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

  python_app:
    build: .           # This folder should have a Dockerfile 
    env_file:          # to connect to the database
      - .env
    volumes: 
    - ./logs:/app/logs 
    command: python app/main.py
    depends_on:
      - db

volumes:
  postgres_data: